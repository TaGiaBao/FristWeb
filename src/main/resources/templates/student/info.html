<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Info</title>
</head>
<body>
    <h1>Thông tin sinh viên</h1>
    <p>Họ tên: <span th:text="${student.name}"></span></p>

    <p>Ngành: <span th:text="${student.major}"></span></p>
</body>
</html>
